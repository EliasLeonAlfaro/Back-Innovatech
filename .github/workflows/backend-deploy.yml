name: Backend Microservices CI/CD (Private Subnet Deploy)

on:
  push:
    branches:
      - deploy

jobs:
  # -------------------------------------------------------------
  # JOB 1: MICROSERVICIO DESPACHOS
  # -------------------------------------------------------------
  deploy-despachos:
    name: Build & Deploy Despachos
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy'
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Subir Imagen Docker (Despachos)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./back-Despachos_SpringBoot/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/back_despachos:latest

      - name: Copiar docker-compose.yml a la EC2 Privada
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_EC2_BACKEND_PRIVATE_IP }}
          username: ec2-user
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          proxy_host: ${{ secrets.AWS_EC2_FRONTEND_IP }}
          proxy_username: ec2-user
          proxy_key: ${{ secrets.AWS_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/ec2-user/app/"

      - name: Despliegue en AWS EC2 Privada vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_BACKEND_PRIVATE_IP }}
          username: ec2-user
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          proxy_host: ${{ secrets.AWS_EC2_FRONTEND_IP }}
          proxy_username: ec2-user
          proxy_key: ${{ secrets.AWS_PRIVATE_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DB_ENDPOINT,DB_NAME,DB_USERNAME,DB_PASSWORD
          script: |
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            cd /home/ec2-user/app
            docker pull $DOCKERHUB_USERNAME/back_despachos:latest
            export DOCKERHUB_USERNAME="$DOCKERHUB_USERNAME"
            export DB_ENDPOINT="$DB_ENDPOINT"
            export DB_NAME="$DB_NAME"
            export DB_USERNAME="$DB_USERNAME"
            export DB_PASSWORD="$DB_PASSWORD"
            docker compose up -d --no-deps --build back_despachos

  # -------------------------------------------------------------
  # JOB 2: MICROSERVICIO VENTAS
  # -------------------------------------------------------------
  deploy-ventas:
    name: Build & Deploy Ventas
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy'
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Subir Imagen Docker (Ventas)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./back-Ventas_SpringBoot/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/back_ventas:latest

      - name: Copiar docker-compose.yml a la EC2 Privada
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_EC2_BACKEND_PRIVATE_IP }}
          username: ec2-user
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          proxy_host: ${{ secrets.AWS_EC2_FRONTEND_IP }}
          proxy_username: ec2-user
          proxy_key: ${{ secrets.AWS_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/ec2-user/app/"

      - name: Despliegue en AWS EC2 Privada vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_BACKEND_PRIVATE_IP }}
          username: ec2-user
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          proxy_host: ${{ secrets.AWS_EC2_FRONTEND_IP }}
          proxy_username: ec2-user
          proxy_key: ${{ secrets.AWS_PRIVATE_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DB_ENDPOINT,DB_NAME,DB_USERNAME,DB_PASSWORD
          script: |
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            cd /home/ec2-user/app
            docker pull $DOCKERHUB_USERNAME/back_ventas:latest
            export DOCKERHUB_USERNAME="$DOCKERHUB_USERNAME"
            export DB_ENDPOINT="$DB_ENDPOINT"
            export DB_NAME="$DB_NAME"
            export DB_USERNAME="$DB_USERNAME"
            export DB_PASSWORD="$DB_PASSWORD"
            docker compose up -d --no-deps --build back_ventas