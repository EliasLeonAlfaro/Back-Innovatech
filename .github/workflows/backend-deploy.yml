name: Backend Microservices CI/CD (AWS EKS Deploy)

on:
  push:
    branches:
      - deploy

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: TU_NOMBRE_DE_CLUSTER_EKS # ⚠️ Cambia esto por el nombre de tu clúster

jobs:
  build-and-deploy:
    name: Build, Push & Deploy to EKS
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy'
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Requerido por AWS Academy
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------------------------------------------
      # COMPILACIÓN Y ENVÍO A DOCKER HUB (Con tags únicos por Commit)
      # -------------------------------------------------------------
      - name: Construir y Subir Imagen Docker (Despachos)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./back-Despachos_SpringBoot/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/back_despachos:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/back_despachos:${{ github.sha }}

      - name: Construir y Subir Imagen Docker (Ventas)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./back-Ventas_SpringBoot/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/back_ventas:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/back_ventas:${{ github.sha }}

      # -------------------------------------------------------------
      # DESPLIEGUE EN AWS EKS
      # -------------------------------------------------------------
      - name: Configurar kubeconfig para EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Crear Secretos de Base de Datos en K8s (IE5)
        run: |
          # Esto crea los secrets de forma dinámica y segura en el clúster sin exponer credenciales
          kubectl create secret generic db-secrets \
            --from-literal=username="${{ secrets.DB_USERNAME }}" \
            --from-literal=password="${{ secrets.DB_PASSWORD }}" \
            --from-literal=endpoint="${{ secrets.DB_ENDPOINT }}" \
            --from-literal=dbname="${{ secrets.DB_NAME }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Desplegar Manifiestos actualizados en EKS
        run: |
          # Reemplaza la imagen 'latest' por la versión con el SHA del commit actual para forzar el rolling update (redeploy)
          sed -i 's|image: .*back_despachos:latest|image: ${{ secrets.DOCKERHUB_USERNAME }}/back_despachos:${{ github.sha }}|g' k8s/despachos.yml
          sed -i 's|image: .*back_ventas:latest|image: ${{ secrets.DOCKERHUB_USERNAME }}/back_ventas:${{ github.sha }}|g' k8s/ventas.yml
          
          # Aplicar los cambios en el clúster
          kubectl apply -f k8s/despachos.yml
          kubectl apply -f k8s/ventas.yml
          kubectl apply -f k8s/autoscaling.yml