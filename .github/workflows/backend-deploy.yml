name: Backend Microservices CI/CD (Private Subnet Deploy - Docker Run)

on:
  push:
    branches:
      - deploy

jobs:
  # -------------------------------------------------------------
  # JOB 1: MICROSERVICIO DESPACHOS
  # -------------------------------------------------------------
  deploy-despachos:
    name: Build & Deploy Despachos
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy'
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Subir Imagen Docker (Despachos)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./back-Despachos_SpringBoot/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/back_despachos:latest

      - name: Despliegue en AWS EC2 Privada vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_BACKEND_PRIVATE_IP }}
          username: ec2-user
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          proxy_host: ${{ secrets.AWS_EC2_FRONTEND_IP }}
          proxy_username: ec2-user
          proxy_key: ${{ secrets.AWS_PRIVATE_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DB_ENDPOINT,DB_NAME,DB_USERNAME,DB_PASSWORD
          script: |
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}"
            export DB_ENDPOINT="${{ secrets.DB_ENDPOINT }}"
            export DB_NAME="${{ secrets.DB_NAME }}"
            export DB_USERNAME="${{ secrets.DB_USERNAME }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"

            # Login en Docker localmente usando las credenciales mapeadas
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            
            # ➡️ Detener y eliminar el contenedor anterior de Despachos si existe
            docker stop back_despachos_container || true
            docker rm back_despachos_container || true
            
            # Descargar la nueva imagen
            docker pull "$DOCKERHUB_USERNAME/back_despachos:latest"
            
            # ➡️ Despliegue usando "docker run" nativo con sus variables de entorno
            docker run -d \
              --name back_despachos_container \
              -p 8085:8085 \
              --restart always \
              -e SERVER_PORT=8085 \
              -e DB_ENDPOINT="$DB_ENDPOINT" \
              -e DB_PORT=3306 \
              -e DB_NAME="$DB_NAME" \
              -e DB_USERNAME="$DB_USERNAME" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              "$DOCKERHUB_USERNAME/back_despachos:latest"

  # -------------------------------------------------------------
  # JOB 2: MICROSERVICIO VENTAS
  # -------------------------------------------------------------
  deploy-ventas:
    name: Build & Deploy Ventas
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy'
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Subir Imagen Docker (Ventas)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./back-Ventas_SpringBoot/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/back_ventas:latest

      - name: Despliegue en AWS EC2 Privada vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_BACKEND_PRIVATE_IP }}
          username: ec2-user
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          proxy_host: ${{ secrets.AWS_EC2_FRONTEND_IP }}
          proxy_username: ec2-user
          proxy_key: ${{ secrets.AWS_PRIVATE_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DB_ENDPOINT,DB_NAME,DB_USERNAME,DB_PASSWORD
          script: |
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}"
            export DB_ENDPOINT="${{ secrets.DB_ENDPOINT }}"
            export DB_NAME="${{ secrets.DB_NAME }}"
            export DB_USERNAME="${{ secrets.DB_USERNAME }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"

            # Login en Docker localmente
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            
            # ➡️ Detener y eliminar el contenedor anterior de Ventas si existe
            docker stop back_ventas_container || true
            docker rm back_ventas_container || true
            
            # Descargar la nueva imagen
            docker pull "$DOCKERHUB_USERNAME/back_ventas:latest"
            
            # ➡️ Despliegue usando "docker run" nativo con sus variables de entorno
            docker run -d \
              --name back_ventas_container \
              -p 8086:8086 \
              --restart always \
              -e SERVER_PORT=8086 \
              -e DB_ENDPOINT="$DB_ENDPOINT" \
              -e DB_PORT=3306 \
              -e DB_NAME="$DB_NAME" \
              -e DB_USERNAME="$DB_USERNAME" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              "$DOCKERHUB_USERNAME/back_ventas:latest"