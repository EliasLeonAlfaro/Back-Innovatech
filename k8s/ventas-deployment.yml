apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-ventas-deployment
  labels:
    app: back-ventas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: back-ventas
  template:
    metadata:
      labels:
        app: back-ventas
    spec:
      containers:
      - name: back-ventas
        image: TU_USUARIO_DOCKERHUB/back_ventas:latest
        ports:
        - containerPort: 8086
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
        env:
        - name: SERVER_PORT
          value: "8086"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://$(DB_ENDPOINT):3306/$(DB_NAME)?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: password
        - name: DB_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: endpoint
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: dbname
---
apiVersion: v1
kind: Service
metadata:
  name: back-ventas-service
spec:
  type: ClusterIP
  ports:
  - port: 8086
    targetPort: 8086
  selector:
    app: back-ventas