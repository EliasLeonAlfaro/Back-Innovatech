apiVersion: apps/v1
kind: Deployment
metadata:
  name: ventas
  namespace: innovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ventas
  template:
    metadata:
      labels:
        app: ventas
    spec:
      containers:
        - name: ventas
          image: 308769698189.dkr.ecr.us-east-1.amazonaws.com/backend-innovatech:ventas
          ports:
            - containerPort: 8086
          env:
            - name: SERVER_PORT
              value: "8086"

            - name: SPRING_PROFILES_ACTIVE
              value: "prod"

            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: SPRING_DATASOURCE_URL

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: SPRING_DATASOURCE_USERNAME

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: SPRING_DATASOURCE_PASSWORD

            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "3"

            - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
              value: "1"

            - name: SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT
              value: "30000"

            - name: SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT
              value: "120000"

            - name: SPRING_DATASOURCE_HIKARI_MAX_LIFETIME
              value: "300000"

            - name: SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME
              value: "60000"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ventas-service
  namespace: innovatech
spec:
  selector:
    app: ventas
  ports:
    - protocol: TCP
      port: 8086
      targetPort: 8086
  type: ClusterIP