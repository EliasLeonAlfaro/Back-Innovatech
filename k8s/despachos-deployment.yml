apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-despachos-deployment
  labels:
    app: back-despachos
spec:
  replicas: 2 # Tolerancia a fallos: Mínimo 2 réplicas (IE7)
  selector:
    matchLabels:
      app: back-despachos
  template:
    metadata:
      labels:
        app: back-despachos
    spec:
      containers:
      - name: back-despachos
        image: TU_USUARIO_DOCKERHUB/back_despachos:latest # El pipeline cambiará esto dinámicamente
        ports:
        - containerPort: 8085
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
        env:
        - name: SERVER_PORT
          value: "8085"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://$(DB_ENDPOINT):3306/$(DB_NAME)?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: password
        - name: DB_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: endpoint
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: dbname
---
apiVersion: v1
kind: Service
metadata:
  name: back-despachos-service # DNS interno para comunicarse (IE7)
spec:
  type: ClusterIP
  ports:
  - port: 8085
    targetPort: 8085
  selector:
    app: back-despachos